name: Terraform Deploy

on:
  push:
    branches: [main]
    paths: [terraform/environmental/**]
  pull_request:
    paths: [terraform/environmental/**]
  workflow_dispatch:
    inputs:
      log_enricher_image_tag:
        description: "Image tag for log-enricher (git SHA or latest)"
        required: false
        type: string
        default: "latest"
      dashboard_generator_image_tag:
        description: "Image tag for dashboard-generator (git SHA or latest)"
        required: false
        type: string
        default: "latest"
  workflow_call:
    inputs:
      log_enricher_image_tag:
        required: false
        type: string
        default: "latest"
      dashboard_generator_image_tag:
        required: false
        type: string
        default: "latest"
      auto_apply:
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-deploy-sandbox
  cancel-in-progress: false

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: sandbox
    outputs:
      exitcode: ${{ steps.plan.outputs.exitcode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CloudFront functions
        run: pnpm build

      - name: Configure AWS + Terraform
        uses: ./.github/actions/configure-aws-env
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Terraform Init
        run: make environmental-init ACCOUNT=sandbox AWS_PROFILE=

      - name: Terraform Validate
        run: make environmental-validate AWS_PROFILE=

      - name: Terraform Plan
        id: plan
        env:
          TF_VAR_image_tag_log_enricher: ${{ inputs.log_enricher_image_tag || 'latest' }}
          TF_VAR_image_tag_dashboard_generator: ${{ inputs.dashboard_generator_image_tag || 'latest' }}
        run: |
          set +e -o pipefail
          make environmental-plan ACCOUNT=sandbox AWS_PROFILE= TF_FLAGS="-detailed-exitcode -no-color"
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Fail on plan error
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

  apply:
    name: Terraform Apply
    needs: plan
    if: |
      needs.plan.outputs.exitcode == '2' &&
      (github.ref == 'refs/heads/main' || inputs.auto_apply)
    runs-on: ubuntu-latest
    environment: sandbox
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CloudFront functions
        run: pnpm build

      - name: Configure AWS + Terraform
        uses: ./.github/actions/configure-aws-env
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Terraform Init
        run: make environmental-init ACCOUNT=sandbox AWS_PROFILE=

      - name: Terraform Apply
        env:
          TF_VAR_image_tag_log_enricher: ${{ inputs.log_enricher_image_tag || 'latest' }}
          TF_VAR_image_tag_dashboard_generator: ${{ inputs.dashboard_generator_image_tag || 'latest' }}
        run: make environmental-apply ACCOUNT=sandbox AWS_PROFILE= TF_FLAGS="-auto-approve"
