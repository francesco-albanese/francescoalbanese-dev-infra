name: Python CI

on:
  push:
    branches: [main]
    paths:
      - "terraform/environmental/lambdas/**"
      - ".github/workflows/python-ci.yml"
  pull_request:
    paths:
      - "terraform/environmental/lambdas/**"

concurrency:
  group: python-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect lambdas
    runs-on: ubuntu-latest
    outputs:
      lambdas: ${{ steps.detect.outputs.lambdas }}
    steps:
      - uses: actions/checkout@v6
      - id: detect
        run: |
          lambdas=$(find terraform/environmental/lambdas -maxdepth 2 -name pyproject.toml \
            -exec dirname {} \; | xargs -I {} basename {} | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "lambdas=$lambdas" >> "$GITHUB_OUTPUT"
          echo "Detected: $lambdas"

  check:
    name: ${{ matrix.lambda }}
    needs: detect
    runs-on: ubuntu-latest
    if: needs.detect.outputs.lambdas != '[]'

    strategy:
      fail-fast: false
      matrix:
        lambda: ${{ fromJson(needs.detect.outputs.lambdas) }}

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Sync
        working-directory: terraform/environmental/lambdas/${{ matrix.lambda }}
        run: uv sync --all-groups

      - name: Ruff check
        working-directory: terraform/environmental/lambdas/${{ matrix.lambda }}
        run: uv run ruff check

      - name: Ruff format
        working-directory: terraform/environmental/lambdas/${{ matrix.lambda }}
        run: uv run ruff format --check

      - name: Pyright
        working-directory: terraform/environmental/lambdas/${{ matrix.lambda }}
        run: uv run pyright

      - name: Pytest
        working-directory: terraform/environmental/lambdas/${{ matrix.lambda }}
        run: uv run pytest
