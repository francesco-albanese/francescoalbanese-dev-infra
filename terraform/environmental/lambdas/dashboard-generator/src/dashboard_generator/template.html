<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>francescoalbanese.dev &mdash; Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: #0f1117;
      color: #e1e4e8;
      padding: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 { font-size: 1.4rem; margin-bottom: 8px; color: #58a6ff; }
    .meta { font-size: 0.8rem; color: #8b949e; margin-bottom: 24px; }
    .grid { display: grid; gap: 16px; margin-bottom: 24px; }
    .grid-3 { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
    }
    .card h2 { font-size: 0.9rem; color: #8b949e; margin-bottom: 8px; }
    .stat { font-size: 2rem; font-weight: 700; color: #58a6ff; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th, td {
      text-align: left;
      padding: 6px 8px;
      border-bottom: 1px solid #21262d;
    }
    th { color: #8b949e; font-weight: 600; }
    td { color: #c9d1d9; }
    .tag {
      display: inline-block;
      background: #1f6feb33;
      color: #58a6ff;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      margin: 2px;
    }
    .alert-deep { border-left: 3px solid #f0883e; }
    .alert-cluster { border-left: 3px solid #58a6ff; }
    canvas { max-height: 300px; }
    .loading { text-align: center; padding: 48px; color: #8b949e; }
  </style>
</head>
<body>
  <h1>francescoalbanese.dev &mdash; Analytics</h1>
  <div class="meta" id="meta"></div>

  <div class="grid grid-3" id="summary-cards"></div>

  <div class="grid grid-2">
    <div class="card">
      <h2>Daily Visit Trend (30 days)</h2>
      <canvas id="trend-chart"></canvas>
    </div>
    <div class="card">
      <h2>Device Breakdown</h2>
      <canvas id="ua-chart"></canvas>
    </div>
  </div>

  <div class="grid grid-2" style="margin-top:16px">
    <div class="card">
      <h2>Top Cities</h2>
      <table id="cities-table"><thead><tr><th>City</th><th>Visits</th></tr></thead><tbody></tbody></table>
    </div>
    <div class="card">
      <h2>Top Pages</h2>
      <table id="pages-table"><thead><tr><th>Path</th><th>Visits</th></tr></thead><tbody></tbody></table>
    </div>
  </div>

  <div class="grid grid-2" style="margin-top:16px">
    <div class="card">
      <h2>Referrers</h2>
      <table id="referrers-table"><thead><tr><th>Domain</th><th>Count</th></tr></thead><tbody></tbody></table>
    </div>
    <div class="card">
      <h2>Deep Browsers (London/US, 3+ pages)</h2>
      <div id="deep-browsers"></div>
    </div>
  </div>

  <div class="card" style="margin-top:16px">
    <h2>Alert History</h2>
    <div id="alert-history"></div>
  </div>

  <script>
    const DATA_URL = 'data.json';

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function load() {
      if (typeof INLINE_DATA !== 'undefined') {
        render(INLINE_DATA);
      } else {
        fetch(DATA_URL)
          .then(r => r.json())
          .then(render)
          .catch(e => {
            document.body.textContent = '';
            const err = document.createElement('div');
            err.className = 'loading';
            err.textContent = 'Failed to load data: ' + e.message;
            document.body.appendChild(err);
          });
      }
    }

    function render(data) {
      document.getElementById('meta').textContent =
        'Generated: ' + new Date(data.generated_at).toLocaleString() +
        ' | Total records: ' + data.total_records;

      const cards = document.getElementById('summary-cards');
      [
        ['Today', data.visits.today],
        ['This Week', data.visits.this_week],
        ['This Month', data.visits.this_month],
      ].forEach(([label, val]) => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = '<h2>' + label + '</h2><div class="stat">' + val + '</div>';
        cards.appendChild(div);
      });

      renderTrendChart(data.daily_trend);
      renderUAChart(data.ua_breakdown);
      renderTable('cities-table', data.top_cities, r => '<td>' + esc(r.city) + '</td><td>' + r.count + '</td>');
      renderTable('pages-table', data.top_pages, r => '<td>' + esc(r.path) + '</td><td>' + r.count + '</td>');
      renderTable('referrers-table', data.referrers, r => '<td>' + esc(r.domain) + '</td><td>' + r.count + '</td>');
      renderDeepBrowsers(data.deep_browsers);
      renderAlertHistory(data.alert_history);
    }

    function renderTrendChart(trend) {
      new Chart(document.getElementById('trend-chart'), {
        type: 'bar',
        data: {
          labels: trend.map(d => d.date.slice(5)),
          datasets: [{
            data: trend.map(d => d.count),
            backgroundColor: '#1f6feb',
            borderRadius: 4,
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#8b949e', maxRotation: 45 }, grid: { display: false } },
            y: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' }, beginAtZero: true }
          }
        }
      });
    }

    function renderUAChart(breakdown) {
      if (!breakdown.length) return;
      const colors = { Desktop: '#58a6ff', Mobile: '#f0883e', Other: '#8b949e' };
      new Chart(document.getElementById('ua-chart'), {
        type: 'doughnut',
        data: {
          labels: breakdown.map(b => b.category + ' (' + b.percentage + '%)'),
          datasets: [{
            data: breakdown.map(b => b.count),
            backgroundColor: breakdown.map(b => colors[b.category] || '#8b949e'),
            borderWidth: 0,
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { position: 'bottom', labels: { color: '#c9d1d9' } } }
        }
      });
    }

    function renderTable(id, rows, renderRow) {
      const tbody = document.querySelector('#' + id + ' tbody');
      if (!rows.length) { tbody.innerHTML = '<tr><td colspan="2" style="color:#8b949e">No data</td></tr>'; return; }
      rows.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = renderRow(r);
        tbody.appendChild(tr);
      });
    }

    function renderDeepBrowsers(browsers) {
      const container = document.getElementById('deep-browsers');
      if (!browsers.length) { container.innerHTML = '<p style="color:#8b949e;font-size:0.85rem">No deep browse sessions</p>'; return; }
      browsers.forEach(b => {
        const div = document.createElement('div');
        div.className = 'card alert-deep';
        div.style.marginBottom = '8px';
        div.innerHTML =
          '<strong>' + esc(b.city) + ', ' + esc(b.country) + '</strong>' +
          (b.rdns ? ' <span style="color:#8b949e">(' + esc(b.rdns) + ')</span>' : '') +
          '<div style="margin:4px 0">' + b.pages.map(p => '<span class="tag">' + esc(p) + '</span>').join('') + '</div>' +
          '<div style="font-size:0.75rem;color:#8b949e">' + esc(b.user_agent.slice(0, 80)) + '...</div>';
        container.appendChild(div);
      });
    }

    function renderAlertHistory(alerts) {
      const container = document.getElementById('alert-history');
      if (!alerts.length) { container.innerHTML = '<p style="color:#8b949e;font-size:0.85rem">No alerts</p>'; return; }
      alerts.forEach(a => {
        const div = document.createElement('div');
        div.className = 'card ' + (a.type === 'deep_browse' ? 'alert-deep' : 'alert-cluster');
        div.style.marginBottom = '8px';
        if (a.type === 'deep_browse') {
          div.innerHTML = '<strong>Deep Browse</strong> &mdash; ' + esc(a.city) + ', ' + esc(a.country) +
            '<div>' + a.pages.map(p => '<span class="tag">' + esc(p) + '</span>').join('') + '</div>';
        } else {
          div.innerHTML = '<strong>City Cluster</strong> &mdash; ' + esc(a.city) +
            ' (' + a.unique_visitors + ' unique visitors)';
        }
        container.appendChild(div);
      });
    }

    load();
  </script>
</body>
</html>
